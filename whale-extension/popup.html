<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light" />
    <link rel="stylesheet" href="popup.css" />
    <title>LinkScape</title>
  </head>
  <body>
    <!-- 로그인 -->
    <section id="login-view" hidden>
      <h1 class="logo">LinkScape</h1>
      <p class="tagline">링크와 PDF를 캔버스에 담습니다.</p>

      <form id="login-form">
        <input id="login-email" type="email" required autocomplete="email" placeholder="이메일" />
        <input id="login-password" type="password" required minlength="6" autocomplete="current-password" placeholder="비밀번호" />
        <button type="submit" class="action" id="login-submit">로그인</button>
      </form>
      <p id="login-error" class="error" hidden></p>
      <p class="hint-line">
        계정이 없나요? <a id="signup-link" href="#" target="_blank" rel="noreferrer">웹에서 가입 ›</a>
      </p>
    </section>

    <!-- 메인 -->
    <section id="main-view" hidden>
      <header>
        <span class="logo-sm">LinkScape</span>
        <span class="header-links">
          <button id="open-list" class="text-action">목록 보기</button>
          <a id="open-board" class="text-action" href="#" target="_blank" rel="noreferrer">보드 열기 ↗</a>
        </span>
      </header>

      <button id="capture-tab" class="action" hidden>현재 탭 담기</button>

      <div id="dropzone">
        <kbd>Ctrl + V</kbd>
        <p class="dz-main">복사한 링크·텍스트를 카드로</p>
        <p class="dz-sub">PDF · 이미지 · 워드 · 한글 등 파일을 드래그앤드롭</p>
        <p class="dz-pick">또는 <button type="button" id="pick-file">파일 선택</button></p>
      </div>

      <input id="file-input" type="file" multiple hidden />

      <ul id="tasks"></ul>

      <footer>
        <span id="account-email"></span>
        <button id="sign-out" class="text-btn">로그아웃</button>
      </footer>
    </section>

    <!-- 목록 보기 -->
    <section id="list-view" hidden>
      <header>
        <button id="back-to-main" class="text-action">‹ 담기로 돌아가기</button>
        <a id="open-board-list" class="text-action" href="#" target="_blank" rel="noreferrer">보드 열기 ↗</a>
      </header>

      <input id="search-input" type="search" placeholder="내 보드에서 검색" />

      <ul id="item-list"></ul>
    </section>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
